# Default values for docker-template.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

auto_deploy: true

replicaCount: 1

terminationGracePeriodSeconds: 30
allowConcurrency: true

image:
  repository: public.ecr.aws/o1j4x7p4/hello-porter-job
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest
  # A single imagePullSecret that will be injected into the deployment; only use in extreme cases, else it must be left blank. 
  imagePullSecret:

serviceAccount:
  # Specifies whether a service account should be created. Setting this to true makes the resources in the chart use the service account
  # created by the chart. If set to false, resources will use the default service account.
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

container:
  port: 80
  command: ""
  shellForm: false
  args: []
  env:
    normal:

schedule:
  enabled: false
  value: "*/5 * * * *"
  successfulHistory: 20
  failedHistory: 20

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  setCPULimits: false
  limits: {}

paused: false

cloudsql:
  enabled: false

  # instances is the current way to configure CloudSQL connections.
  # Each entry maps to one Cloud SQL instance managed via Porter's service connections.
  # All instances share the same service account (see serviceAccountJSONSecret below) —
  # the proxy connects to multiple instances under one SA.
  instances: []
    # - connectionName: "project:region:instance"
    #   dbPort: 5432

  # --- Legacy fields (deprecated) ---
  # Use instances[] instead. All fields below were workarounds before Porter had
  # native CloudSQL support via service connections.

  # connections was added to support multiple instances via helm overrides before
  # the instances field existed.
  connections: [] # deprecated: use instances[]
    # - name: "project:region:instance"
    #   port: 5432

  # connectionName/dbPort were the original single-instance helm override.
  connectionName: "" # deprecated: use instances[]
  dbPort: 5432 # deprecated: used only with connectionName

  # additionalConnection was a second single-instance override added before connections[].
  additionalConnection: # deprecated: use instances[]
    enabled: false
    dbPort: 5432
    connectionName: ""

  # serviceAccountJSONSecret is the name of the Kubernetes secret containing the
  # Cloud SQL proxy service account key. When using instances[], this is pre-created
  # by Porter's backend. All instances share this single service account.
  # When empty, a secret is created from serviceAccountJSON (legacy path).
  serviceAccountJSONSecret: ""

  serviceAccountJSON: "" # deprecated: used only with the legacy secret-creation path

# Set this for enabling DNS extensions over TCP
# We enable this by default.
enableEDNS0: true

# Set this to configure the ndots DNS option
# Leave empty to use cluster default
ndots:

sidecar:
  signalChildProcesses: true
  # The timeout value in seconds for the job run
  timeout: 3600
  resources:
    requests:
      cpu: 10m
      memory: 100Mi

# Set this to add entries to the /etc/hosts file
# Format: hostAliases: [{ip: <IP>, hostnames: [<HOSTNAME>,..]},..]
hostAliases: []

retainFailedHooks: false
nodeSelector: {}
tolerations: []

stack:
  enabled: false
  name: ""
  revision: 0

podLabels: {}

priorityClassName: ""

nodeGroups: []

# set this to mount files from a secret into the container at /etc/secrets/<mountPath>
# Format: fileSecretMounts: [{secretName: <SECRET_NAME>, mountPath: <MOUNT_PATH>},..]
fileSecretMounts:
  enabled: false
  mounts: []

# Host volume mounts for mounting host directories into containers
# Format: hostVolumeMounts: [{name: <NAME>, hostPath: <HOST_PATH>, mountPath: <CONTAINER_PATH>, type: <HOSTPATH_TYPE>},..]
hostVolumeMounts: []
# Example:
# hostVolumeMounts:
#   - name: nvme-storage
#     hostPath: /mnt/nvme-shared
#     mountPath: /tmp/nvme
#     type: DirectoryOrCreate
#   - name: docker-socket
#     hostPath: /var/run/docker.sock
#     mountPath: /var/run/docker.sock
#     type: Socket

# hostIPC is required on pods that need to access the host's IPC namespace
# this is the case for instance for pods that need to use the MPS sliced GPUs
# enable this conservatively
enableHostIpc: false

pvc:
  enabled: false
  storage: 20Gi
  mountPath: /mypath
  existingVolume: ""

multiplePvc:
  enabled: false
  volumes:
    - name: ""
      storage: 20Gi
      mountPath: /mypath
      existingVolume: ""

# job timeout configuration
activeDeadlineSeconds: # Optional - if not set, will use sidecar.timeout
