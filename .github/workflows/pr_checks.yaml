name: PR Checks

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
permissions:
  contents: read
jobs:
  helm-template:
    name: Basic Helm Template
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            applications/**
      - name: List all changed files
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "$file was changed"
          done

      - name: Setup Helm
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: azure/setup-helm@v4.2.0
        id: install-helm

      - name: Helm template - web
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: helm template applications/web -f applications/testdata/web.yaml

      - name: Helm template - worker
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: helm template applications/worker -f applications/testdata/worker.yaml
        
      - name: Helm template - job
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: helm template applications/job -f applications/testdata/job.yaml

      - name: CloudSQL connections - connection string present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-instances.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL connections - connection string present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-instances.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL connections - connection string present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-instances.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 2 ] || (echo "Expected connection string twice (hook-configmap + cronjob), got ${COUNT}" && exit 1)

      - name: CloudSQL legacy fields - connection string present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-legacy.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL legacy fields - connection string present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-legacy.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL legacy fields - connection string present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-legacy.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 2 ] || (echo "Expected connection string twice (hook-configmap + cronjob), got ${COUNT}" && exit 1)

      - name: CloudSQL mixed legacy+connections - connection string present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-instances-only.yaml)
          COUNT_NEW=$(echo "$OUT" | grep -c "test-project:us-central1:test-instance")
          COUNT_LEGACY=$(echo "$OUT" | grep -c "test-project:us-central1:legacy-instance")
          [ "$COUNT_NEW" -eq 1 ] || (echo "Expected test-instance once, got ${COUNT_NEW}" && exit 1)
          [ "$COUNT_LEGACY" -eq 1 ] || (echo "Expected legacy-instance once, got ${COUNT_LEGACY}" && exit 1)

      - name: CloudSQL mixed legacy+connections - connection string present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-instances-only.yaml)
          COUNT_NEW=$(echo "$OUT" | grep -c "test-project:us-central1:test-instance")
          COUNT_LEGACY=$(echo "$OUT" | grep -c "test-project:us-central1:legacy-instance")
          [ "$COUNT_NEW" -eq 1 ] || (echo "Expected test-instance once, got ${COUNT_NEW}" && exit 1)
          [ "$COUNT_LEGACY" -eq 1 ] || (echo "Expected legacy-instance once, got ${COUNT_LEGACY}" && exit 1)

      - name: CloudSQL mixed legacy+connections - connection string present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-instances-only.yaml)
          COUNT_NEW=$(echo "$OUT" | grep -c "test-project:us-central1:test-instance")
          COUNT_LEGACY=$(echo "$OUT" | grep -c "test-project:us-central1:legacy-instance")
          [ "$COUNT_NEW" -eq 2 ] || (echo "Expected test-instance twice (hook-configmap + cronjob), got ${COUNT_NEW}" && exit 1)
          [ "$COUNT_LEGACY" -eq 2 ] || (echo "Expected legacy-instance twice (hook-configmap + cronjob), got ${COUNT_LEGACY}" && exit 1)

      - name: CloudSQL additionalConnection - connection string present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-additionalconnection.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL additionalConnection - connection string present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-additionalconnection.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL additionalConnection - connection string present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-additionalconnection.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 2 ] || (echo "Expected connection string twice (hook-configmap + cronjob), got ${COUNT}" && exit 1)
