name: PR Checks

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
permissions:
  contents: read
jobs:
  helm-template:
    name: Basic Helm Template
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            applications/**
      - name: List all changed files
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "$file was changed"
          done

      - name: Setup Helm
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: azure/setup-helm@v4.2.0
        id: install-helm

      - name: Helm template - web
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: helm template applications/web -f applications/testdata/web.yaml

      - name: Helm template - worker
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: helm template applications/worker -f applications/testdata/worker.yaml
        
      - name: Helm template - job
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: helm template applications/job -f applications/testdata/job.yaml

      - name: CloudSQL connections - connection string present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-instances.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL connections - connection string present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-instances.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL connections - connection string present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-instances.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 2 ] || (echo "Expected connection string twice (hook-configmap + cronjob), got ${COUNT}" && exit 1)

      - name: CloudSQL legacy fields - connection string present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-legacy.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL legacy fields - connection string present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-legacy.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL legacy fields - connection string present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-legacy.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 2 ] || (echo "Expected connection string twice (hook-configmap + cronjob), got ${COUNT}" && exit 1)

      - name: CloudSQL mixed legacy+connections - connection string present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-instances-only.yaml)
          COUNT_NEW=$(echo "$OUT" | grep -c "test-project:us-central1:test-instance")
          COUNT_LEGACY=$(echo "$OUT" | grep -c "test-project:us-central1:legacy-instance")
          [ "$COUNT_NEW" -eq 1 ] || (echo "Expected test-instance once, got ${COUNT_NEW}" && exit 1)
          [ "$COUNT_LEGACY" -eq 1 ] || (echo "Expected legacy-instance once, got ${COUNT_LEGACY}" && exit 1)

      - name: CloudSQL mixed legacy+connections - connection string present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-instances-only.yaml)
          COUNT_NEW=$(echo "$OUT" | grep -c "test-project:us-central1:test-instance")
          COUNT_LEGACY=$(echo "$OUT" | grep -c "test-project:us-central1:legacy-instance")
          [ "$COUNT_NEW" -eq 1 ] || (echo "Expected test-instance once, got ${COUNT_NEW}" && exit 1)
          [ "$COUNT_LEGACY" -eq 1 ] || (echo "Expected legacy-instance once, got ${COUNT_LEGACY}" && exit 1)

      - name: CloudSQL mixed legacy+connections - connection string present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-instances-only.yaml)
          COUNT_NEW=$(echo "$OUT" | grep -c "test-project:us-central1:test-instance")
          COUNT_LEGACY=$(echo "$OUT" | grep -c "test-project:us-central1:legacy-instance")
          [ "$COUNT_NEW" -eq 2 ] || (echo "Expected test-instance twice (hook-configmap + cronjob), got ${COUNT_NEW}" && exit 1)
          [ "$COUNT_LEGACY" -eq 2 ] || (echo "Expected legacy-instance twice (hook-configmap + cronjob), got ${COUNT_LEGACY}" && exit 1)

      - name: CloudSQL multiple connections - all connection strings present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-multi-connections.yaml)
          COUNT_PRIMARY=$(echo "$OUT" | grep -c "test-project:us-central1:primary-instance")
          COUNT_SECONDARY=$(echo "$OUT" | grep -c "test-project:us-central1:secondary-instance")
          [ "$COUNT_PRIMARY" -eq 1 ] || (echo "Expected primary-instance once in proxy args, got ${COUNT_PRIMARY}" && exit 1)
          [ "$COUNT_SECONDARY" -eq 1 ] || (echo "Expected secondary-instance once in proxy args, got ${COUNT_SECONDARY}" && exit 1)

      - name: CloudSQL multiple connections - all connection strings present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-multi-connections.yaml)
          COUNT_PRIMARY=$(echo "$OUT" | grep -c "test-project:us-central1:primary-instance")
          COUNT_SECONDARY=$(echo "$OUT" | grep -c "test-project:us-central1:secondary-instance")
          [ "$COUNT_PRIMARY" -eq 1 ] || (echo "Expected primary-instance once in proxy args, got ${COUNT_PRIMARY}" && exit 1)
          [ "$COUNT_SECONDARY" -eq 1 ] || (echo "Expected secondary-instance once in proxy args, got ${COUNT_SECONDARY}" && exit 1)

      - name: CloudSQL multiple connections - all connection strings present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-multi-connections.yaml)
          COUNT_PRIMARY=$(echo "$OUT" | grep -c "test-project:us-central1:primary-instance")
          COUNT_SECONDARY=$(echo "$OUT" | grep -c "test-project:us-central1:secondary-instance")
          [ "$COUNT_PRIMARY" -eq 2 ] || (echo "Expected primary-instance twice (hook-configmap + cronjob), got ${COUNT_PRIMARY}" && exit 1)
          [ "$COUNT_SECONDARY" -eq 2 ] || (echo "Expected secondary-instance twice (hook-configmap + cronjob), got ${COUNT_SECONDARY}" && exit 1)

      - name: CloudSQL additionalConnection - connection string present (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-additionalconnection.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL additionalConnection - connection string present (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-additionalconnection.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 1 ] || (echo "Expected connection string once in proxy args, got ${COUNT}" && exit 1)

      - name: CloudSQL additionalConnection - connection string present (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          COUNT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-additionalconnection.yaml \
            | grep -c "test-project:us-central1:test-instance")
          [ "$COUNT" -eq 2 ] || (echo "Expected connection string twice (hook-configmap + cronjob), got ${COUNT}" && exit 1)

      - name: CloudSQL proxy version - default uses v1 image (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-instances.yaml)
          echo "$OUT" | grep -q "gcr.io/cloudsql-docker/gce-proxy" \
            || (echo "Expected v1 proxy image by default" && exit 1)
          echo "$OUT" | grep -q "cloud-sql-connectors" \
            && (echo "Unexpected v2 proxy image in default config" && exit 1) || true

      - name: CloudSQL proxy version - default uses v1 image (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-instances.yaml)
          echo "$OUT" | grep -q "gcr.io/cloudsql-docker/gce-proxy" \
            || (echo "Expected v1 proxy image by default" && exit 1)
          echo "$OUT" | grep -q "cloud-sql-connectors" \
            && (echo "Unexpected v2 proxy image in default config" && exit 1) || true

      - name: CloudSQL proxy version - default uses v1 image (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-instances.yaml)
          echo "$OUT" | grep -q "gcr.io/cloudsql-docker/gce-proxy" \
            || (echo "Expected v1 proxy image by default" && exit 1)
          echo "$OUT" | grep -q "cloud-sql-connectors" \
            && (echo "Unexpected v2 proxy image in default config" && exit 1) || true

      - name: CloudSQL proxy version - v2 opt-in uses v2 image (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-v2.yaml)
          echo "$OUT" | grep -q "gcr.io/cloud-sql-connectors/cloud-sql-proxy" \
            || (echo "Expected v2 proxy image when proxyVersion=v2" && exit 1)
          echo "$OUT" | grep -q "cloudsql-docker/gce-proxy" \
            && (echo "Unexpected v1 proxy image when proxyVersion=v2" && exit 1) || true

      - name: CloudSQL proxy version - v2 opt-in uses v2 image (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-v2.yaml)
          echo "$OUT" | grep -q "gcr.io/cloud-sql-connectors/cloud-sql-proxy" \
            || (echo "Expected v2 proxy image when proxyVersion=v2" && exit 1)
          echo "$OUT" | grep -q "cloudsql-docker/gce-proxy" \
            && (echo "Unexpected v1 proxy image when proxyVersion=v2" && exit 1) || true

      - name: CloudSQL proxy version - v2 opt-in uses v2 image (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-v2.yaml)
          echo "$OUT" | grep -q "gcr.io/cloud-sql-connectors/cloud-sql-proxy" \
            || (echo "Expected v2 proxy image when proxyVersion=v2" && exit 1)
          echo "$OUT" | grep -q "cloudsql-docker/gce-proxy" \
            && (echo "Unexpected v1 proxy image when proxyVersion=v2" && exit 1) || true

      # --- No-breaking-change guard: existing configs must stay on v1 ---
      # Without proxyVersion set, the v1 -instances=NAME=tcp:PORT format must be used.
      # With proxyVersion: v1 explicitly set, same guarantee holds.

      - name: CloudSQL no-breaking-change - default renders v1 arg format (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-instances.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:test-instance=tcp:5432" \
            || (echo "Expected v1 -instances=NAME=tcp:PORT format by default" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file" \
            && (echo "Unexpected v2 --credentials-file flag in default config" && exit 1) || true

      - name: CloudSQL no-breaking-change - default renders v1 arg format (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-instances.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:test-instance=tcp:5432" \
            || (echo "Expected v1 -instances=NAME=tcp:PORT format by default" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file" \
            && (echo "Unexpected v2 --credentials-file flag in default config" && exit 1) || true

      - name: CloudSQL no-breaking-change - default renders v1 arg format (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-instances.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:test-instance=tcp:5432" \
            || (echo "Expected v1 -instances=NAME=tcp:PORT format by default" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file" \
            && (echo "Unexpected v2 --credentials-file flag in default config" && exit 1) || true

      - name: CloudSQL no-breaking-change - explicit v1 renders v1 arg format (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-explicit-v1.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:test-instance=tcp:5432" \
            || (echo "Expected v1 -instances=NAME=tcp:PORT format for proxyVersion=v1" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file" \
            && (echo "Unexpected v2 --credentials-file flag for proxyVersion=v1" && exit 1) || true

      - name: CloudSQL no-breaking-change - explicit v1 renders v1 arg format (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-explicit-v1.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:test-instance=tcp:5432" \
            || (echo "Expected v1 -instances=NAME=tcp:PORT format for proxyVersion=v1" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file" \
            && (echo "Unexpected v2 --credentials-file flag for proxyVersion=v1" && exit 1) || true

      - name: CloudSQL no-breaking-change - explicit v1 renders v1 arg format (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-explicit-v1.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:test-instance=tcp:5432" \
            || (echo "Expected v1 -instances=NAME=tcp:PORT format for proxyVersion=v1" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file" \
            && (echo "Unexpected v2 --credentials-file flag for proxyVersion=v1" && exit 1) || true

      # --- Argument format: v2 uses NAME?port=PORT positional args and --credentials-file ---

      - name: CloudSQL arg format - v2 uses NAME?port=PORT and --credentials-file (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-v2.yaml)
          echo "$OUT" | grep -q "test-project:us-central1:test-instance?port=5432" \
            || (echo "Expected v2 NAME?port=PORT positional arg format" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file=/secrets/service_account.json" \
            || (echo "Expected --credentials-file flag in v2 config" && exit 1)
          echo "$OUT" | grep -q -- "-instances=" \
            && (echo "Unexpected v1 -instances= flag in v2 config" && exit 1) || true

      - name: CloudSQL arg format - v2 uses NAME?port=PORT and --credentials-file (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-v2.yaml)
          echo "$OUT" | grep -q "test-project:us-central1:test-instance?port=5432" \
            || (echo "Expected v2 NAME?port=PORT positional arg format" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file=/secrets/service_account.json" \
            || (echo "Expected --credentials-file flag in v2 config" && exit 1)
          echo "$OUT" | grep -q -- "-instances=" \
            && (echo "Unexpected v1 -instances= flag in v2 config" && exit 1) || true

      - name: CloudSQL arg format - v2 uses NAME?port=PORT and --credentials-file (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-v2.yaml)
          echo "$OUT" | grep -q "test-project:us-central1:test-instance?port=5432" \
            || (echo "Expected v2 NAME?port=PORT positional arg format" && exit 1)
          echo "$OUT" | grep -q -- "--credentials-file=/secrets/service_account.json" \
            || (echo "Expected --credentials-file flag in v2 config" && exit 1)
          echo "$OUT" | grep -q -- "-instances=" \
            && (echo "Unexpected v1 -instances= flag in v2 config" && exit 1) || true

      - name: CloudSQL arg format - v1 uses -credential_file (not --credentials-file) (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-instances.yaml)
          echo "$OUT" | grep -q -- "-credential_file=/secrets/service_account.json" \
            || (echo "Expected v1 -credential_file flag by default" && exit 1)

      - name: CloudSQL arg format - v1 uses -credential_file (not --credentials-file) (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-instances.yaml)
          echo "$OUT" | grep -q -- "-credential_file=/secrets/service_account.json" \
            || (echo "Expected v1 -credential_file flag by default" && exit 1)

      - name: CloudSQL arg format - v1 uses -credential_file (not --credentials-file) (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-instances.yaml)
          echo "$OUT" | grep -q -- "-credential_file=/secrets/service_account.json" \
            || (echo "Expected v1 -credential_file flag by default" && exit 1)

      - name: CloudSQL arg format - job sidecar kills correct proxy binary by default (v1)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-instances.yaml)
          echo "$OUT" | grep -q '"cloud_sql_proxy"' \
            || (echo "Expected sidecar to reference cloud_sql_proxy (v1 binary) by default" && exit 1)
          echo "$OUT" | grep -q '"cloud-sql-proxy"' \
            && (echo "Unexpected v2 binary name in sidecar for default config" && exit 1) || true

      - name: CloudSQL arg format - job sidecar kills correct proxy binary for v2
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-v2.yaml)
          echo "$OUT" | grep -q '"cloud-sql-proxy"' \
            || (echo "Expected sidecar to reference cloud-sql-proxy (v2 binary) when proxyVersion=v2" && exit 1)
          echo "$OUT" | grep -q '"cloud_sql_proxy"' \
            && (echo "Unexpected v1 binary name in sidecar for proxyVersion=v2" && exit 1) || true

      # --- Multi-instance format: v1=comma-joined in one flag, v2=separate positional args ---

      - name: CloudSQL multi-instance - v1 uses comma-separated -instances= flag (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-multi-connections.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:primary-instance=tcp:5432,test-project:us-central1:secondary-instance=tcp:5433" \
            || (echo "Expected single comma-joined -instances= flag for v1 multi-instance" && exit 1)

      - name: CloudSQL multi-instance - v1 uses comma-separated -instances= flag (worker)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/worker \
            -f applications/testdata/worker.yaml \
            -f applications/testdata/worker-cloudsql-multi-connections.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:primary-instance=tcp:5432,test-project:us-central1:secondary-instance=tcp:5433" \
            || (echo "Expected single comma-joined -instances= flag for v1 multi-instance" && exit 1)

      - name: CloudSQL multi-instance - v1 uses comma-separated -instances= flag (job)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/job \
            -f applications/testdata/job.yaml \
            -f applications/testdata/job-cloudsql-multi-connections.yaml)
          echo "$OUT" | grep -q -- "-instances=test-project:us-central1:primary-instance=tcp:5432,test-project:us-central1:secondary-instance=tcp:5433" \
            || (echo "Expected single comma-joined -instances= flag for v1 multi-instance" && exit 1)

      - name: CloudSQL multi-instance - v2 uses separate positional args (web)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          OUT=$(helm template applications/web \
            -f applications/testdata/web.yaml \
            -f applications/testdata/web-cloudsql-v2-multi.yaml)
          echo "$OUT" | grep -q "test-project:us-central1:primary-instance?port=5432" \
            || (echo "Expected primary-instance as separate positional arg in v2" && exit 1)
          echo "$OUT" | grep -q "test-project:us-central1:secondary-instance?port=5433" \
            || (echo "Expected secondary-instance as separate positional arg in v2" && exit 1)
